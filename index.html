<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="icon" href="/img/favicon/icons8-giratorio-32.png" type="image/png">
  <link rel="stylesheet" href="./css/style.css">
  <title>Turno</title>
</head>
<body>
  <div class="container">
    <h1>Formulario</h1>
    <form action="" method="post" id="form">
      <label for="names">Nombres:</label>
      <input type="text" id="names" name="names" required>
      <br><br>
      <label for="surnames">Apellidos:</label>
      <input type="text" id="surnames" name="surnames" required>
      <br><br>
      <label for="number">Cedula:</label>
      <input type="number" id="number" name="number" required>
      <br><br>
      <label for="email">Correo Electrónico:</label>
      <input type="email" id="email" name="email" required>
      <br><br>
      <label for="genero">Género:</label>
      <select id="genero" name="genero" required>
        <option value="">Seleccione</option>
        <option value="masculino">Masculino</option>
        <option value="femenino">Femenino</option>
        <option value="otro">Otro</option>
      </select>
      <br><br>
      <label class="label" for="horario">Tu turno es:</label>
      <select id="horario" name="horario" required>
        <option value="">Seleccione</option>
        <option value="6am-12pm">12 Horas</option>
        <option value="6am-2pm">8 horas mañana</option>
        <option value="2pm-10pm">8 horas Tarde</option>
      </select>
      <br><br>
      <input id="changeText" type="submit" value="Enviar">
    </form>
  </div>
  <script src="./js/form.js"></script>
</body>
</html>
